<h1 style="background-color: #f3f3f3;border: 1px dashed #515151;padding: 5px;font-size: 1.5em;color: #000;text-decoration: none;">如何使Map不能再新增元素?</h1>
<span style="color: #686868;display: block;">[作者] 棚子</span>
<span style="color: #c97c7c;display: block;padding-bottom: 1em;border-bottom:1px solid #e7e7e7;;">[创建时间] 2024-02-16 11:45:27</span>
<p>Map不能再新增元素，有人会想到final修饰，但是map是引用对象，所以final只能保证Map map &#x3D; new HashMap&lt;&gt;()的引用地址不变，并不能保证map里的元素不能新增。</p>
<h3 id="利用Collections类提供的方法"><a href="#利用Collections类提供的方法" class="headerlink" title="利用Collections类提供的方法"></a>利用Collections类提供的方法</h3><p><code>Map map = Collections.unmodifiableMap(map)</code>，这样如果再往map中添加元素就会报错。</p>
<h3 id="自己对map封装"><a href="#自己对map封装" class="headerlink" title="自己对map封装"></a>自己对map封装</h3><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">MyMap</span>&lt;K,V&gt; &#123;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">private</span> <span class="keyword">final</span> Map&lt;K,V&gt; map = <span class="keyword">new</span> <span class="title class_">ConcurrentHashMap</span>&lt;&gt;();</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> <span class="title function_">MyMap</span><span class="params">(Map&lt;K,V&gt; map)</span> &#123;</span><br><span class="line">        map.forEach(<span class="built_in">this</span>.map::put);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> V <span class="title function_">get</span><span class="params">(K key)</span> &#123;</span><br><span class="line">        <span class="keyword">return</span> map.get(key);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
